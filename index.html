    function PAPAccentButton({ children, onClick, className = "", outline = false, type = "button" }) {
      const ref = useRef(null);
      const x = useMotionValue(0);
      const y = useMotionValue(0);
      const springX = useSpring(x, { damping: 15, stiffness: 150, mass: 0.1 });
      const springY = useSpring(y, { damping: 15, stiffness: 150, mass: 0.1 });

      const handleMouseMove = (e) => {
        const rect = ref.current.getBoundingClientRect();
        x.set((e.clientX - rect.left - rect.width / 2) * 0.2);
        y.set((e.clientY - rect.top - rect.height / 2) * 0.2);
      };
      const handleMouseLeave = () => { x.set(0); y.set(0); };

      const baseStyle = "relative px-8 py-4 font-bold flex items-center justify-center gap-2 overflow-hidden transition-all duration-300 rounded-sm uppercase tracking-wider text-sm";
      const colorStyle = outline
        ? "border border-papGold text-papGold hover:bg-papGold hover:text-black shadow-[0_0_15px_rgba(212,175,55,0.15)]"
        : "bg-papGold text-black hover:bg-white hover:text-black shadow-[0_0_20px_rgba(212,175,55,0.3)] hover:shadow-[0_0_30px_rgba(255,255,255,0.5)]";

      return (
        <motion.button
          type={type}
          ref={ref} onClick={onClick} onMouseMove={handleMouseMove} onMouseLeave={handleMouseLeave}
          style={{ x: springX, y: springY }} whileTap={{ scale: 0.95 }}
          className={`${baseStyle} ${colorStyle} ${className}`}
        >
          <span className="relative z-10 flex items-center gap-2">{children}</span>
        </motion.button>
      );
    }
